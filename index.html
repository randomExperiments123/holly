<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holly Matthews — Portfolio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #c9a0ff;
    --accent-dim: #6b4d94;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* — Hero — */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
  }
  .hero h1 {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
  }
  .hero h1 span {
    background: linear-gradient(135deg, var(--accent), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    margin-top: 1.2rem;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: var(--muted);
    max-width: 520px;
  }
  .hero .contact { margin-top: 2rem; }
  .hero .contact a {
    color: var(--accent);
    text-decoration: none;
    font-size: 1rem;
    letter-spacing: 0.05em;
    border: 1px solid var(--accent-dim);
    padding: 0.6em 1.8em;
    border-radius: 999px;
    transition: all .3s;
    display: inline-block;
    margin: 0.4rem;
  }
  .hero .contact a:hover {
    background: var(--accent);
    color: #000;
  }
  .dl-btn { border-color: var(--accent) !important; }
  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    animation: bob 2s ease-in-out infinite;
    color: var(--muted);
    font-size: 0.85rem;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  /* — Section — */
  .section {
    padding: 6rem 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .section-title {
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 3rem;
    text-align: center;
  }

  /* — Grid — */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }
  .grid-item {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .35s cubic-bezier(.25,.8,.25,1), box-shadow .35s;
    background: var(--surface);
  }
  .grid-item:hover {
    transform: translateY(-4px) scale(1.015);
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .grid-item picture,
  .grid-item img {
    width: 100%;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    display: block;
    border-radius: 12px;
  }

  /* — Lightbox — */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .35s;
  }
  .lightbox.active { display: flex; opacity: 1; }
  .lightbox picture,
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 12px;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  .lightbox .close {
    position: absolute;
    top: 1.5rem;
    right: 2rem;
    font-size: 2rem;
    color: #fff;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
    transition: color .2s;
    z-index: 1001;
  }
  .lightbox .close:hover { color: var(--accent); }
  .lightbox .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2.5rem;
    color: #fff5;
    cursor: pointer;
    background: none;
    border: none;
    padding: 1rem;
    transition: color .2s;
    user-select: none;
    z-index: 1001;
  }
  .lightbox .nav:hover { color: #fff; }
  .lightbox .nav.prev { left: 1rem; }
  .lightbox .nav.next { right: 1rem; }
  .lightbox .counter {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    z-index: 1001;
  }

  /* — Footer — */
  footer {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    border-top: 1px solid #1f1f22;
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* — Responsive — */
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 550px) {
    .grid { grid-template-columns: 1fr; }
    .section { padding: 4rem 1rem; }
  }
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <h1><span>Holly Matthews</span></h1>
  <p>Designer &amp; creative thinker. Explore a curated collection of my work below.</p>
  <div class="contact">
    <a href="mailto:info@hollymatthews.co.uk">Get in Touch</a>
    <a href="designs.pdf" download class="dl-btn">Download PDF</a>
  </div>
  <div class="scroll-hint">↓ Scroll to view work</div>
</section>

<!-- Gallery -->
<section class="section">
  <h2 class="section-title">Selected Work</h2>
  <div class="grid" id="grid"></div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="close" id="lbClose">&times;</button>
  <button class="nav prev" id="lbPrev">&#10094;</button>
  <button class="nav next" id="lbNext">&#10095;</button>
  <picture id="lbPicture">
    <source id="lbSource" type="image/avif">
    <img id="lbImg" src="" alt="">
  </picture>
  <div class="counter" id="lbCounter"></div>
</div>

<!-- Footer -->
<footer>
  <p>&copy; 2025 Holly Matthews. All rights reserved.<br>
  <a href="mailto:info@hollymatthews.co.uk">info@hollymatthews.co.uk</a></p>
</footer>

<script>
const thumbs = [
  'images/avif/page-01_thumb.avif','images/avif/page-02_thumb.avif','images/avif/page-03_thumb.avif',
  'images/avif/page-04_thumb.avif','images/avif/page-05_thumb.avif','images/avif/page-06_thumb.avif',
  'images/avif/page-07_thumb.avif','images/avif/page-08_thumb.avif','images/avif/page-09_thumb.avif',
  'images/avif/page-10_thumb.avif','images/avif/page-11_thumb.avif','images/avif/page-12_thumb.avif',
  'images/avif/page-13_thumb.avif','images/avif/page-14_thumb.avif','images/avif/page-15_thumb.avif'
];

const mediums = [
  'images/avif/page-01_medium.avif','images/avif/page-02_medium.avif','images/avif/page-03_medium.avif',
  'images/avif/page-04_medium.avif','images/avif/page-05_medium.avif','images/avif/page-06_medium.avif',
  'images/avif/page-07_medium.avif','images/avif/page-08_medium.avif','images/avif/page-09_medium.avif',
  'images/avif/page-10_medium.avif','images/avif/page-11_medium.avif','images/avif/page-12_medium.avif',
  'images/avif/page-13_medium.avif','images/avif/page-14_medium.avif','images/avif/page-15_medium.avif'
];

const grid = document.getElementById('grid');
thumbs.forEach((src, i) => {
  const item = document.createElement('div');
  item.className = 'grid-item';
  const picture = document.createElement('picture');
  const source = document.createElement('source');
  source.type = 'image/avif';
  source.srcset = src + ' 1x, ' + src.replace('_thumb','_thumb@2x') + ' 2x';
  const img = document.createElement('img');
  img.src = src.replace('.avif','.jpg');
  img.srcset = src.replace('.avif','.jpg').replace('_thumb','_thumb@2x') + ' 2x';
  img.alt = 'Design ' + (i + 1);
  img.loading = 'lazy';
  img.width = 400;
  img.height = 500;
  picture.appendChild(source);
  picture.appendChild(img);
  item.appendChild(picture);
  item.addEventListener('click', () => openLightbox(i));
  grid.appendChild(item);
});

let current = 0;
const lb = document.getElementById('lightbox');
const lbSource = document.getElementById('lbSource');
const lbImg = document.getElementById('lbImg');
const lbCounter = document.getElementById('lbCounter');

function openLightbox(i) {
  current = i;
  updateLB();
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('active');
  document.body.style.overflow = '';
}
function updateLB() {
  lbSource.srcset = mediums[current] + ' 1x, ' + mediums[current].replace('_medium','_medium@2x') + ' 2x';
  lbImg.src = mediums[current].replace('.avif','.jpg');
  lbImg.srcset = mediums[current].replace('.avif','.jpg').replace('_medium','_medium@2x') + ' 2x';
  lbCounter.textContent = (current + 1) + ' / ' + thumbs.length;
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => {
  current = (current - 1 + thumbs.length) % thumbs.length;
  updateLB();
});
document.getElementById('lbNext').addEventListener('click', () => {
  current = (current + 1) % thumbs.length;
  updateLB();
});
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
  if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
});
</script>
</body>
</html>
